name: awd_check
description: "An app to check if a vehicle has AWD/4WD by scanning and processing the VIN."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Camera and ML Kit
  camera: ^0.10.5+5
  google_mlkit_text_recognition: ^0.7.0
  image_picker: ^1.0.4
  
  # HTTP and JSON
  http: ^1.1.0
  
  # UI and State Management
  provider: ^6.0.0
  
  # Image handling
  image: ^4.0.0
  
  # Loading and animations
  lottie: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
